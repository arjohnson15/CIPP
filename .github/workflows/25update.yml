name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      # Overlay REDiTECH branding onto the source tree before the build.
      # Branding assets live in the fork-only branding/ dir (upstream has no
      # such folder, so pull[bot] syncs never touch them). This step re-applies
      # them on every deploy, so upstream changes to logo.js are harmless.
      - name: Apply REDiTECH branding
        run: |
          if [ -f branding/logo.js ]; then
            cp branding/logo.js src/components/logo.js
            echo "Applied branding/logo.js -> src/components/logo.js"
          else
            echo "branding/logo.js not found; skipping (deploying stock logo)"
          fi
          # Widen CIPP's fixed 24x24 nav logo slot so a wide wordmark is legible.
          # Best-effort + non-fatal: if upstream restructures these files and the
          # pattern no longer matches, we just log and continue (logo falls back
          # to the small slot; the build never fails on this).
          node -e '
            const fs = require("fs");
            const files = ["src/layouts/top-nav.js", "src/layouts/mobile-nav.js"];
            const re = /display:\s*(["\x27])inline-flex\1,\s*height:\s*24,\s*width:\s*24,/;
            for (const f of files) {
              try {
                let s = fs.readFileSync(f, "utf8");
                if (re.test(s)) {
                  s = s.replace(re, "display: \x27inline-flex\x27, alignItems: \x27center\x27, height: 30, width: \x27auto\x27,");
                  fs.writeFileSync(f, s);
                  console.log("Widened logo slot in " + f);
                } else {
                  console.log("Logo-slot pattern not found in " + f + " (skipped, non-fatal)");
                }
              } catch (e) {
                console.log("Could not patch " + f + ": " + e.message);
              }
            }
          '
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_MUSHROOM_07886B310 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "/out"
